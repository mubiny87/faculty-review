<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faculty Review</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{font-family:Poppins;margin:0;background:linear-gradient(135deg,#eef2f7,#e3e9f3);} 
header{background:linear-gradient(90deg,#1e3c72,#2a5298);color:white;padding:20px;text-align:center;font-size:22px;font-weight:600;}
.container{padding:20px;max-width:1100px;margin:auto;}
.login{background:white;padding:25px;border-radius:15px;box-shadow:0 5px 20px rgba(0,0,0,0.1);margin-bottom:20px;display:flex;flex-direction:column;gap:10px;max-width:350px;margin:auto;}
input{padding:10px;border-radius:8px;border:1px solid #ccc;}
button{padding:8px 12px;border:none;border-radius:8px;cursor:pointer;font-weight:500;}
.login button{background:#2ecc71;color:white;}
.search{margin:15px auto;max-width:400px;display:none;}
.search input{width:100%;}
.departments{display:flex;flex-wrap:wrap;gap:12px;margin:20px 0;justify-content:center;}
.departments button{background:#3498db;color:white;font-size:14px;padding:12px 18px;border-radius:12px;}
.faculty-card{background:white;padding:20px;margin-top:20px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.08);display:flex;gap:20px;}
.faculty-card img{width:110px;height:110px;border-radius:15px;}
</style>
</head>
<body>
<header>
  Faculty Review System
  <button onclick="logout()" style="float:right;background:#e74c3c;color:white;">Logout</button>
</header>

<div class="container">
<div class="login" id="loginBox">
<input id="name" placeholder="Name">
<input id="studentId" placeholder="Student ID">
<input id="dept" placeholder="Department">
<input id="semester" placeholder="Semester">
<button onclick="login()">Enter</button>
</div>

<div class="search" id="searchBox">
<input type="text" placeholder="Search faculty or course..." oninput="searchFaculty(this.value)">
</div>

<div class="departments" style="display:none" id="deptBtns">
<button onclick="loadDept('CSE')">BCSE</button>
</div>

<div id="facultyList"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBdznGTj7SNdwJpwTQ033SvvFVcWefxPI8",
  authDomain: "faculty-review-e7130.firebaseapp.com",
  projectId: "faculty-review-e7130",
  storageBucket: "faculty-review-e7130.firebasestorage.app",
  messagingSenderId: "939366308662",
  appId: "1:939366308662:web:7a37adcfd94e92241d3197"
};

initializeApp(firebaseConfig);
getFirestore();

const data={
CSE:[
{name:"Dr Abhijit Saha",img:"https://via.placeholder.com/120",courses:["CSE2201"]},
{name:"Dr Rashedul Islam",img:"https://via.placeholder.com/120",courses:["CSE2301"]},
{name:"Shahinur Alam",img:"https://via.placeholder.com/120",courses:["CSE1201"]},
{name:"Dr Ishtiak Al Mamoon",img:"https://via.placeholder.com/120",courses:["CSE3301"]},
{name:"Dr Abdul Awal",img:"https://via.placeholder.com/120",courses:["CSE2101"]},
{name:"Krishna Das",img:"https://via.placeholder.com/120",courses:["CSE3101"]},
{name:"Arifa Tur Rahman",img:"https://via.placeholder.com/120",courses:["CSE2202"]},
{name:"Md Alomgir Hossain",img:"https://via.placeholder.com/120",courses:["CSE4101"]},
{name:"Ferdaus Anam Jibon",img:"https://via.placeholder.com/120",courses:["CSE3201"]},
{name:"Saidur Rahman",img:"https://via.placeholder.com/120",courses:["CSE2102"]}
]

function login(){
  const name=document.getElementById('name').value.trim();
  const id=document.getElementById('studentId').value.trim();
  const dept=document.getElementById('dept').value.trim();
  const sem=document.getElementById('semester').value.trim();

  if(!name||!id||!dept||!sem) return alert('Fill all fields');

  localStorage.setItem('user',JSON.stringify({name,id,dept,sem}));

  document.getElementById('loginBox').style.display='none';
  document.getElementById('deptBtns').style.display='flex';
  document.getElementById('searchBox').style.display='block';
}

function logout(){
  localStorage.removeItem('user');
  document.getElementById('loginBox').style.display='flex';
  document.getElementById('deptBtns').style.display='none';
  document.getElementById('searchBox').style.display='none';
  document.getElementById('facultyList').innerHTML='';
}

window.addEventListener('load',()=>{
  const user=localStorage.getItem('user');
  if(user){
    document.getElementById('loginBox').style.display='none';
    document.getElementById('deptBtns').style.display='flex';
    document.getElementById('searchBox').style.display='block';
  }
});

function loadDept(dept){
  renderList(data[dept]);
}

function renderList(listData){
  const list=document.getElementById('facultyList');
  list.innerHTML='';

  listData.forEach(f=>{
    const card=document.createElement('div');
    card.className='faculty-card';
    card.innerHTML=`
    <img src="${f.img}">
    <div style="flex:1">
    <h3>${f.name}</h3>
    <div>Courses: ${f.courses.join(', ')}</div>
    </div>`;

    list.appendChild(card);
  });
}

function searchFaculty(query){
  query=query.toLowerCase();
  const filtered=data.CSE.filter(f=>
    f.name.toLowerCase().includes(query)||
    f.courses.join('').toLowerCase().includes(query)
  );
  renderList(filtered);
}

window.login=login;
window.logout=logout;
window.loadDept=loadDept;
window.searchFaculty=searchFaculty;

</script>
</body>
</html>
